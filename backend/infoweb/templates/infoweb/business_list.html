{% extends "infoweb/layout.html" %}
{% block body %}

<div class="container py-5">
  <h2 class="fw-bold mb-4">All Businesses</h2>

  <div class="row">
    {% for business in businesses %}
    <div class="col-md-4 mb-4">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <h5 class="fw-bold">{{ business.title }}</h5>
          <p class="text-muted">{{ business.subtitle }}</p>

          <a href="{% url 'update-business' business.type %}" 
             class="btn btn-teal w-100">
             Edit Business type
          </a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
